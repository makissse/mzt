openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: mzt platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: releases
    description: Music releases
  - name: reviews
    description: Release reviews
  - name: upload
    description: File uploads
  - name: stats
    description: Platform statistics
  - name: recommendations
    description: Recommendations mode
  - name: blogs
    description: User blogs
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /releases:
    get:
      operationId: listReleases
      tags: [releases]
      summary: List all releases
      responses:
        "200":
          description: List of releases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Release"
    post:
      operationId: createRelease
      tags: [releases]
      summary: Create a release
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReleaseInput"
      responses:
        "201":
          description: Release created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Release"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /releases/{id}:
    get:
      operationId: getRelease
      tags: [releases]
      summary: Get a release with its tracks and reviews
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Release detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteRelease
      tags: [releases]
      summary: Delete a release
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /releases/{releaseId}/reviews:
    post:
      operationId: createReview
      tags: [reviews]
      summary: Create a review for a release
      parameters:
        - name: releaseId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "400":
          description: Validation error or already reviewed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /releases/{releaseId}/reviews/{id}:
    delete:
      operationId: deleteReview
      tags: [reviews]
      summary: Delete a review
      parameters:
        - name: releaseId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get platform statistics
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"

  /recommendations/videos:
    get:
      operationId: listVideos
      tags: [recommendations]
      summary: List video recommendations
      responses:
        "200":
          description: List of videos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Video"
    post:
      operationId: createVideo
      tags: [recommendations]
      summary: Add a video recommendation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VideoInput"
      responses:
        "201":
          description: Video created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Video"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /recommendations/videos/{id}:
    delete:
      operationId: deleteVideo
      tags: [recommendations]
      summary: Delete a video recommendation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /recommendations/movies:
    get:
      operationId: listMovies
      tags: [recommendations]
      summary: List movie recommendations
      responses:
        "200":
          description: List of movies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Movie"
    post:
      operationId: createMovie
      tags: [recommendations]
      summary: Add a movie recommendation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MovieInput"
      responses:
        "201":
          description: Movie created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Movie"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /recommendations/movies/{id}:
    delete:
      operationId: deleteMovie
      tags: [recommendations]
      summary: Delete a movie recommendation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /recommendations/music:
    get:
      operationId: listMusic
      tags: [recommendations]
      summary: List music recommendations
      responses:
        "200":
          description: List of music
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecommendationMusic"
    post:
      operationId: createMusic
      tags: [recommendations]
      summary: Add a music recommendation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecommendationMusicInput"
      responses:
        "201":
          description: Music created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationMusicDetail"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /recommendations/music/{id}:
    get:
      operationId: getMusic
      tags: [recommendations]
      summary: Get a music recommendation with tracks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Music detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationMusicDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteMusic
      tags: [recommendations]
      summary: Delete a music recommendation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /recommendations/fetch-video-meta:
    post:
      operationId: fetchVideoMeta
      tags: [recommendations]
      summary: Fetch YouTube video metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VideoUrlInput"
      responses:
        "200":
          description: Metadata fetched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoMeta"
        "422":
          description: Could not fetch metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /secret-photo:
    get:
      operationId: getSecretPhoto
      tags: [auth]
      summary: Get secret photo unlock status
      responses:
        "200":
          description: Unlock status and photo URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretPhotoStatus"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /blogs:
    get:
      operationId: listBlogs
      tags: [blogs]
      summary: List all blogs
      responses:
        "200":
          description: List of blogs with post counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Blog"
    post:
      operationId: createMyBlog
      tags: [blogs]
      summary: Create a blog for the current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogCreateInput"
      responses:
        "201":
          description: Blog created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Blog"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Blog already exists or handle taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /blogs/{handle}:
    get:
      operationId: getBlog
      tags: [blogs]
      summary: Get a blog feed by handle
      parameters:
        - name: handle
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Blog feed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogFeed"
        "404":
          description: Blog not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateMyBlog
      tags: [blogs]
      summary: Update the current user's blog
      parameters:
        - name: handle
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogUpdateInput"
      responses:
        "200":
          description: Blog updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Blog"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Blog not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /blogs/{handle}/posts:
    post:
      operationId: createBlogPost
      tags: [blogs]
      summary: Create a new post in a blog
      parameters:
        - name: handle
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogPostInput"
      responses:
        "201":
          description: Post created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Blog not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /blogs/posts/{id}:
    put:
      operationId: updateBlogPost
      tags: [blogs]
      summary: Update a blog post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogPostInput"
      responses:
        "200":
          description: Post updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteBlogPost
      tags: [blogs]
      summary: Delete a blog post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - username
        - createdAt

    SecretPhotoStatus:
      type: object
      properties:
        unlocked:
          type: boolean
        photoUrl:
          type: ["string", "null"]
        progress:
          type: object
          properties:
            recommendations:
              type: object
              properties:
                current:
                  type: integer
                needed:
                  type: integer
              required:
                - current
                - needed
            reviews:
              type: object
              properties:
                current:
                  type: integer
                needed:
                  type: integer
              required:
                - current
                - needed
            tracks:
              type: object
              properties:
                current:
                  type: integer
                needed:
                  type: integer
              required:
                - current
                - needed
          required:
            - recommendations
            - reviews
            - tracks
      required:
        - unlocked
        - photoUrl
        - progress

    AuthInput:
      type: object
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 32
        password:
          type: string
          minLength: 6
      required:
        - username
        - password

    UploadResult:
      type: object
      properties:
        url:
          type: string
      required:
        - url

    Track:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        audioUrl:
          type: string
        order:
          type: integer
      required:
        - id
        - title
        - audioUrl
        - order

    TrackInput:
      type: object
      properties:
        title:
          type: string
        audioUrl:
          type: string
      required:
        - title
        - audioUrl

    Release:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [single, album]
        artist:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]
        coverUrl:
          type: string
        audioUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        createdBy:
          $ref: "#/components/schemas/User"
        averageScore:
          type: ["integer", "null"]
        reviewCount:
          type: integer
      required:
        - id
        - type
        - artist
        - title
        - coverUrl
        - createdAt
        - createdBy
        - reviewCount

    ReleaseDetail:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [single, album]
        artist:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]
        coverUrl:
          type: string
        audioUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        createdBy:
          $ref: "#/components/schemas/User"
        averageScore:
          type: ["integer", "null"]
        reviewCount:
          type: integer
        tracks:
          type: array
          items:
            $ref: "#/components/schemas/Track"
        reviews:
          type: array
          items:
            $ref: "#/components/schemas/Review"
        userReview:
          oneOf:
            - $ref: "#/components/schemas/Review"
            - type: "null"
      required:
        - id
        - type
        - artist
        - title
        - coverUrl
        - createdAt
        - createdBy
        - reviewCount
        - tracks
        - reviews

    ReleaseInput:
      type: object
      properties:
        type:
          type: string
          enum: [single, album]
        artist:
          type: string
          minLength: 1
        title:
          type: string
          minLength: 1
        description:
          type: string
        coverUrl:
          type: string
        audioUrl:
          type: string
        tracks:
          type: array
          items:
            $ref: "#/components/schemas/TrackInput"
      required:
        - type
        - artist
        - title
        - coverUrl

    Review:
      type: object
      properties:
        id:
          type: integer
        releaseId:
          type: integer
        user:
          $ref: "#/components/schemas/User"
        rhymes:
          type: integer
          minimum: 1
          maximum: 10
        structure:
          type: integer
          minimum: 1
          maximum: 10
        styleExecution:
          type: integer
          minimum: 1
          maximum: 10
        individuality:
          type: integer
          minimum: 1
          maximum: 10
        atmosphere:
          type: integer
          minimum: 1
          maximum: 10
        score:
          type: integer
        comment:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - releaseId
        - user
        - rhymes
        - structure
        - styleExecution
        - individuality
        - atmosphere
        - score
        - comment
        - createdAt

    ReviewInput:
      type: object
      properties:
        rhymes:
          type: integer
          minimum: 1
          maximum: 10
        structure:
          type: integer
          minimum: 1
          maximum: 10
        styleExecution:
          type: integer
          minimum: 1
          maximum: 10
        individuality:
          type: integer
          minimum: 1
          maximum: 10
        atmosphere:
          type: integer
          minimum: 1
          maximum: 10
        comment:
          type: string
          minLength: 1
      required:
        - rhymes
        - structure
        - styleExecution
        - individuality
        - atmosphere
        - comment

    Stats:
      type: object
      properties:
        totalReleases:
          type: integer
        totalReviews:
          type: integer
        averageScore:
          type: ["integer", "null"]
        topRelease:
          oneOf:
            - $ref: "#/components/schemas/Release"
            - type: "null"
        recentReleases:
          type: array
          items:
            $ref: "#/components/schemas/Release"
      required:
        - totalReleases
        - totalReviews
        - recentReleases

    Video:
      type: object
      properties:
        id:
          type: integer
        url:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]
        thumbnailUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        createdBy:
          $ref: "#/components/schemas/User"
      required:
        - id
        - url
        - title
        - createdAt
        - createdBy

    VideoInput:
      type: object
      properties:
        url:
          type: string
          minLength: 1
        title:
          type: string
          minLength: 1
        description:
          type: string
        thumbnailUrl:
          type: string
      required:
        - url
        - title

    VideoUrlInput:
      type: object
      properties:
        url:
          type: string
          minLength: 1
      required:
        - url

    VideoMeta:
      type: object
      properties:
        title:
          type: ["string", "null"]
        thumbnailUrl:
          type: ["string", "null"]

    Movie:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        genre:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 10
        createdAt:
          type: string
          format: date-time
        createdBy:
          $ref: "#/components/schemas/User"
      required:
        - id
        - title
        - genre
        - rating
        - createdAt
        - createdBy

    MovieInput:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        genre:
          type: string
          minLength: 1
        rating:
          type: integer
          minimum: 1
          maximum: 10
      required:
        - title
